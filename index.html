<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主婦聯盟合作社中壢站-合作教育遊戲</title>
    <style>
        :root { 
            --primary-color: #558b2f; /* 主婦聯盟代表綠 */
            --secondary-color: #fdd835; /* 活力黃 */
            --bg-color: #f1f8e9; 
            --error-color: #e57373;
            --white: #ffffff; 
            --text-main: #33691e;
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background: linear-gradient(135deg, #f1f8e9 0%, #dcedc8 100%); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; 
        }
        .container { 
            background: var(--white); width: 100%; max-width: 480px; padding: 40px 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
        }
        .hidden { display: none !important; }
        
        /* 文字標題樣式 */
        .station-name { color: var(--text-main); font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .main-title { color: var(--primary-color); font-size: 28px; margin: 0 0 20px 0; border-bottom: 2px solid var(--secondary-color); display: inline-block; padding-bottom: 5px; }
        
        .btn { 
            background-color: var(--primary-color); color: white; border: none; padding: 15px; 
            border-radius: 30px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        /* 選項按鈕 */
        .option-btn { 
            display: block; width: 100%; text-align: left; padding: 16px; margin: 12px 0; 
            border: 2px solid #e8f5e9; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .option-btn:hover { border-color: var(--primary-color); background-color: #f1f8e9; }
        .option-btn.correct { background-color: #e8f5e9; border-color: #81c784; color: #2e7d32; font-weight: bold; }
        .option-btn.wrong { background-color: #ffebee; border-color: #e57373; color: #c62828; }

        /* 解析區塊 */
        #feedback-area { 
            margin-top: 20px; padding: 20px; border-radius: 12px; text-align: left; 
            background: #fffde7; border-left: 6px solid var(--secondary-color); 
        }
        .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: 0.4s; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .score-box { font-size: 60px; font-weight: bold; color: var(--primary-color); margin: 20px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <div class="station-name">主婦聯盟生活消費合作社 中壢站</div>
            <h1 class="main-title">區年會小遊戲</h1>
            <p style="color: #555; line-height: 1.6;">歡迎社員參加！<br>本測驗將從 20 題庫中隨機抽出 10 題。<br><strong>正確率達 60% 以上</strong>即可參加抽獎。</p>
            <button class="btn" onclick="startQuiz()">開始挑戰</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <p id="question-number" style="color: #777; font-size: 14px; font-weight: bold;"></p>
            <h3 id="question-text" style="color: #333; line-height: 1.4;"></h3>
            <div id="options-container"></div>
            
            <div id="feedback-area" class="hidden">
                <p id="feedback-text" style="font-size: 15px; line-height: 1.6; margin-bottom: 15px;"></p>
                <button class="btn" onclick="goToNextQuestion()">下一題</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>測驗完成</h2>
            <div class="score-box" id="final-score">0</div>
            <p id="result-msg" style="font-size: 18px; margin-bottom: 30px;"></p>
            
            <div id="lottery-form" class="hidden">
                <input type="text" id="user-name" placeholder="請輸入 真實姓名">
                <input type="text" id="user-id" placeholder="請輸入 社員編號">
                <button class="btn" id="submit-btn" onclick="submitForm()">送出資料參加抽獎</button>
            </div>
            <button id="retry-btn" class="btn hidden" onclick="location.reload()">重新挑戰</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwe1pa3bClEhXZURY8G586Za8C4MAeg8Fzw__W0AT25eG-4kEKxTLj5kXfIyMmjZKgipw/exec'; 

        const allQuestions = [
            { q: "合作社的第一項原則是？", a: ["公開與自願的社員制", "一人一票制", "盈餘全數分紅", "政府全額補助"], correct: 0, reason: "合作社歡迎所有認同目標並願負擔義務的人加入，不分性別、宗教或地位。" },
            { q: "在合作社的民主管理中，投票權通常如何計算？", a: ["按出資比例", "一人一票制", "按年資", "按學歷"], correct: 1, reason: "不論出資多少，每位社員均平等享有一票，這體現了「人」優先於「資本」的精神。" },
            { q: "合作社的盈餘分配主要是依據社員的什麼？", a: ["認股金額", "利用額(交易量)", "報到順序", "抽籤決定"], correct: 1, reason: "盈餘是根據社員對合作社產品的「利用程度」返還。" },
            { q: "合作社是一家以什麼為核心的組織？", a: ["資本", "人", "股票市場", "政府公信力"], correct: 1, reason: "合作社是由人組成的社群，目的是滿足社員需求而非單純追求資本利潤。" },
            { q: "下列何者是合作社發展的「社間合作」精神？", a: ["併吞競爭對手", "各類合作社相互支援", "禁止與他社往來", "僅與外資合作"], correct: 1, reason: "透過與其他合作社合作，能更有效地服務社員並強化運動力量。" },
            { q: "合作社的「股份」是否可以在股票市場自由買賣？", a: ["可以", "不行，通常由合作社收回", "視股價而定", "僅限晚上交易"], correct: 1, reason: "合作社股份非投機商品，離開時按原價領回。" },
            { q: "合作社的最高權力機構是？", a: ["理事會", "監事會", "社員大會", "總經理"], correct: 2, reason: "社員大會是最高決策機關，落實社員共治精神。" },
            { q: "「自治與獨立」原則是指合作社在與政府協議時應？", a: ["完全聽命", "維持合作社自主性", "交出所有權", "放棄投票權"], correct: 1, reason: "即使與政府合作也要由社員民主控制，維持自主性。" },
            { q: "合作社強調對誰的教育與訓練？", a: ["僅限高層", "社員、職員與社會大眾", "僅限政府官員", "不需教育"], correct: 1, reason: "教育能推廣合作理念，是合作社發展與永續的根基。" },
            { q: "合作社第七項原則「關懷地區社會」是指？", a: ["透過社員核可政策，促進社區發展", "在社區廣發傳單", "免費提供所有商品", "搬離社區"], correct: 0, reason: "合作社致力於其所在社區的文化與環境永續發展。" },
            { q: "主婦聯盟合作社的前身是什麼？", a: ["綠主張共同購買中心", "綠色和平", "主婦商場", "農委會"], correct: 0, reason: "1993年由主婦發起的「共同購買」是我們合作社的起點。" },
            { q: "合作社推動「共同購買」的核心價值不包含？", a: ["支持友善農法", "追求市場最低價", "減塑行動", "維護社員健康"], correct: 1, reason: "我們追求合理價格與安心品質，而非削價競爭。" },
            { q: "在主婦聯盟合作社中，出資加入並利用的人稱為？", a: ["顧客", "股東", "社員", "會員"], correct: 2, reason: "社員是共同擁有者、經營者，也是產品的利用人。" },
            { q: "合作社為了減少食物浪費，推行什麼制度？", a: ["預估生產(預購)", "買一送一", "限時特價", "隨機出貨"], correct: 0, reason: "預購能讓生產者安心耕作，避免生產過剩導致的剩食浪費。" },
            { q: "主婦聯盟合作社標誌上的「綠主張」精神核心為何？", a: ["惜物與永續", "大量消費", "只買進口貨", "越貴越好"], correct: 0, reason: "代表了對地球友善、生活簡樸且資源循環的價值追求。" },
            { q: "支持在地農業，減少運輸碳足跡的行為稱為？", a: ["地產地消", "國際貿易", "進口替代", "農業補貼"], correct: 0, reason: "選用在地食材能大幅降低運輸里程所產生的排碳量。" },
            { q: "主婦聯盟合作社長期推動的環境行動為何？", a: ["回收玻璃瓶與減塑", "廣發紙本傳單", "推廣一次性餐具", "增加塑膠包裝"], correct: 0, reason: "例如回收醬油瓶再利用，是合作社減少資源浪費的重要傳統。" },
            { q: "「共同購買」精神最早是從哪個國家傳入台灣的？", a: ["美國", "英國", "日本", "德國"], correct: 2, reason: "深受日本「生活俱樂部生協」的啟發，開啟了台灣的共購模式。" },
            { q: "加入合作社時，為了營運資金所需繳納的款項稱為？", a: ["入會費", "股金", "保護費", "年費"], correct: 1, reason: "股金是社員對合作社的共同投資，也是社方採購的基礎。" },
            { q: "合作社的社員可以在哪裡進行社群交流與取貨？", a: ["便利商店", "百貨公司", "取貨站或取貨班", "大賣場"], correct: 2, reason: "站所不只是買菜的地方，更是社員交流理想生活的據點。" }
        ];

        let questions = []; 
        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function startQuiz() {
            // 隨機抽取 10 題
            questions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
            currentIdx = 0;
            score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const qData = questions[currentIdx];
            document.getElementById('question-number').innerText = `STEP ${currentIdx + 1} / 10`;
            document.getElementById('question-text').innerText = qData.q;
            document.getElementById('feedback-area').classList.add('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            qData.a.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => checkAnswer(idx, b);
                container.appendChild(b);
            });
            document.getElementById('progress').style.width = `${((currentIdx) / 10) * 100}%`;
        }

        function checkAnswer(idx, btn) {
            if (answered) return;
            answered = true;
            const qData = questions[currentIdx];
            const feedbackText = document.getElementById('feedback-text');
            const btns = document.querySelectorAll('.option-btn');

            if (idx === qData.correct) {
                score += 10;
                btn.classList.add('correct');
                feedbackText.innerHTML = `<b style="color: #2e7d32; font-size: 18px;">✅ 答對了！</b><br><span style="color: #444;">${qData.reason}</span>`;
            } else {
                btn.classList.add('wrong');
                btns[qData.correct].classList.add('correct');
                feedbackText.innerHTML = `<b style="color: #c62828; font-size: 18px;">❌ 答錯了...</b><br><span style="color: #444;">正確答案是：<b>${qData.a[qData.correct]}</b><br>${qData.reason}</span>`;
            }
            document.getElementById('progress').style.width = `${((currentIdx + 1) / 10) * 100}%`;
            document.getElementById('feedback-area').classList.remove('hidden');
        }

        function goToNextQuestion() {
            currentIdx++;
            if (currentIdx < 10) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            if (score >= 60) {
                document.getElementById('result-msg').innerText = "太優秀了！您對合作社非常了解！";
                document.getElementById('lottery-form').classList.remove('hidden');
            } else {
                document.getElementById('result-msg').innerText = "分數未達標，再接再厲！";
                document.getElementById('retry-btn').classList.remove('hidden');
            }
        }

        function submitForm() {
            const name = document.getElementById('user-name').value;
            const id = document.getElementById('user-id').value;
            const btn = document.getElementById('submit-btn');

            if (!name || !id) {
                alert("請務必填寫姓名與編號");
                return;
            }

            btn.disabled = true;
            btn.innerText = "傳送中...";

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: name, id: id, score: score })
            }).then(() => {
                alert("資料已成功記錄，祝您中獎！");
                location.reload();
            }).catch(error => {
                alert("提交完成！");
                location.reload();
            });
        }
    </script>
</body>
</html>
